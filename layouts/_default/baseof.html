<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="alternate" type="application/rss+xml" href="{{ "index.xml" | absURL }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="{{ "/" | relURL }}" class="brand">{{ .Site.Title }}</a>
      <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
      <div class="nav-links">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL | relURL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a>
        {{ end }}
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <span class="theme-icon-light">&#9788;</span>
        <span class="theme-icon-dark">&#9790;</span>
      </button>
    </div>
  </nav>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; {{ now.Year }} {{ .Site.Title }}. All Rights Reserved.</p>
    </div>
  </footer>

  <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">&#8593;</button>

  <script src="{{ "js/copy.js" | relURL }}"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
  <script>
    // Theme toggle - cycles: auto -> dark -> light -> auto
    function getTheme() { return localStorage.getItem('theme') || 'auto'; }
    function setTheme(t) {
      localStorage.setItem('theme', t);
      document.documentElement.setAttribute('data-theme', t);
    }
    function toggleTheme() {
      const cur = getTheme();
      let next;
      if (cur === 'auto') next = 'dark';
      else if (cur === 'dark') next = 'light';
      else next = 'auto';
      setTheme(next);
    }
    setTheme(getTheme());

    // Back to top
    window.addEventListener('scroll', function() {
      const btn = document.querySelector('.back-to-top');
      if (window.scrollY > 300) { btn.classList.add('visible'); }
      else { btn.classList.remove('visible'); }
    });

    // Search functionality
    function searchPageFind(q) {
      if (q.length < 2) return;
      window.location.href = '{{ "search/" | relURL }}?q=' + encodeURIComponent(q);
    }
  </script>

  <!-- Giscus Comments -->
  <script src="https://giscus.app/client.js"
    data-repo="YOUR_GITHUB_REPO"
    data-repo-id="YOUR_REPO_ID"
    data-category="Announcements"
    data-category-id="YOUR_CATEGORY_ID"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="preferred_color_scheme"
    data-lang="en"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
  </script>
</body>
</html>
