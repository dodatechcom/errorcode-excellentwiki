<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="{{ "/" | relURL }}" class="brand">{{ .Site.Title }}</a>
      <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
      <div class="nav-links">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL | relURL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a>
        {{ end }}
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <span class="theme-icon-light">&#9788;</span>
        <span class="theme-icon-dark">&#9790;</span>
      </button>
    </div>
  </nav>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; {{ now.Year }} {{ .Site.Title }}. All Rights Reserved.</p>
      <p>This ErrorCode project is a part of <a href="https://dodatechcom.com" target="_blank" rel="noopener">DodaTech.com</a></p>
    </div>
  </footer>

  <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">&#8593;</button>

  {{ partial "scripts.html" . }}
</body>
</html>
