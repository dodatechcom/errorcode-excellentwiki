baseURL: "https://errorcode.excellentwiki.com/"
title: "ErrorCode — Error Code Reference & Solutions"
languageCode: "en"
paginate: 20

enableRobotsTXT: true
enableGitInfo: true

refLinksErrorLevel: WARNING

frontmatter:
  lastmod: ["lastmod", ":git", "date", "publishDate"]

taxonomies: []

outputFormats:
  JSON:
    mediaType: "application/json"
    baseName: "errors"
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - JSON

menu:
  main:
    - name: "OS Errors"
      url: "/os/"
      weight: 10
    - name: "Languages"
      url: "/languages/"
      weight: 20
    - name: "Tools"
      url: "/tools/"
      weight: 25
    - name: "Frameworks"
      url: "/frameworks/"
      weight: 27
    - name: "Cloud"
      url: "/cloud/"
      weight: 29
    - name: "IDEs"
      url: "/tools/#ides"
      weight: 30
    - name: "Deprecated"
      url: "/deprecated/"
      weight: 30
    - name: "Quick Reference"
      url: "/quick-reference/"
      weight: 40
    - name: "Compare"
      url: "/comparison/"
      weight: 45
    - name: "Search"
      url: "/search/"
      weight: 50

params:
  description: "Comprehensive error code reference with solutions. Covers Windows, Linux, macOS, Python, C, C++, PHP, Java, JavaScript and more."
  author: "ErrorCode"
  ogImage: "/images/og-image.jpg"
  giscus:
    repo: ""
    repoId: ""
    category: "Announcements"
    categoryId: ""

markup:
  highlight:
    lineNos: false
    style: "monokai"
    guessSyntax: true
  goldmark:
    extensions:
      headingAnchor: true
      table: true
