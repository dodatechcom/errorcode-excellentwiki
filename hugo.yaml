baseURL: "https://errorcode.excellentwiki.com/"
title: "ErrorCode — Error Code Reference & Solutions"
languageCode: "en"
paginate: 20

enableRobotsTXT: true

taxonomies:
  platform: "platforms"
  language: "languages"
  error_type: "error-types"
  severity: "severities"
  tag: "tags"

outputFormats:
  JSON:
    mediaType: "application/json"
    baseName: "errors"
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - JSON
    - RSS

menu:
  main:
    - name: "OS Errors"
      url: "/os/"
      weight: 10
    - name: "Languages"
      url: "/languages/"
      weight: 20
    - name: "Deprecated"
      url: "/deprecated/"
      weight: 30
    - name: "Quick Reference"
      url: "/quick-reference/"
      weight: 40
    - name: "Compare"
      url: "/comparison/"
      weight: 45
    - name: "Search"
      url: "/search/"
      weight: 50

params:
  description: "Comprehensive error code reference with solutions. Covers Windows, Linux, macOS, Python, C, C++, PHP, Java, JavaScript and more."
  author: "ErrorCode"

markup:
  highlight:
    lineNos: false
    style: "monokai"
    guessSyntax: true
  goldmark:
    extensions:
      headingAnchor: true
      table: true

ignoreLogs: ['warning-goldmark-raw-html']
